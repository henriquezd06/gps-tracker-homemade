<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracker - UDP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; margin: 0 auto; }
        h1 { font-size: 18px; margin-bottom: 15px; }
        #status { margin-bottom: 15px; font-size: 14px; }
        .connected { color: green; }
        .disconnected { color: red; }
        .seccion { margin-bottom: 20px; }
        .seccion h2 { font-size: 15px; margin-bottom: 8px; text-decoration: underline; }
        p { font-size: 14px; margin: 4px 0; }
        hr { margin: 15px 0; border: none; border-top: 1px solid #ccc; }
        #mapa { width: 100%; height: 400px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #333; color: #fff; padding: 6px 8px; text-align: left; position: sticky; top: 0; }
        td { padding: 4px 8px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #eef; }
        #contador { font-size: 13px; color: #666; margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>GPS TRACKER — UDP</h1>
    <div id="status" class="disconnected">Conectando al servidor...</div>
    <div class="seccion">
        <h2>DATOS GPS</h2>
        <p>LATITUD: <span id="lat">Esperando...</span></p>
        <p>LONGITUD: <span id="lng">Esperando...</span></p>
        <p>FECHA: <span id="fecha">Esperando...</span></p>
        <p>HORA: <span id="hora">Esperando...</span></p>
    </div>
    <hr>
    <div class="seccion">
        <h2>GEOLOCALIZACIÓN EN TIEMPO REAL</h2>
        <div id="mapa"></div>
    </div>
    <hr>
    <div class="seccion">
        <h2>SNIFFER UDP</h2>
        <p id="contador">Paquetes capturados: 0</p>
    </div>
    <table>
        <thead>
            <tr>
                <th>No.</th>
                <th>Fecha</th>
                <th>Time (COL)</th>
                <th>Source</th>
                <th>Destination</th>
                <th>Protocol</th>
                <th>Length</th>
                <th>Info</th>
            </tr>
        </thead>
        <tbody id="dataBody"></tbody>
    </table>

    <script>
        var mapa = L.map('mapa').setView([10.9685, -74.7813], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(mapa);

        var marcador = null;
        // La ruta ahora se dibuja por segmentos de carretera via OSRM
        var rutaPolyline = L.polyline([], { color: '#e74c3c', weight: 4 }).addTo(mapa);
        var ultimoPunto = null; // Guarda el último punto para pedir ruta al siguiente

        // Consulta OSRM para obtener la ruta por carretera entre dos puntos
        // Si OSRM falla, dibuja línea recta como fallback
        function obtenerRutaOSRM(desde, hasta, callback) {
            var url = 'https://router.project-osrm.org/route/v1/driving/' +
                desde[1] + ',' + desde[0] + ';' +
                hasta[1] + ',' + hasta[0] +
                '?overview=full&geometries=geojson';

            fetch(url)
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.code === 'Ok' && data.routes.length > 0) {
                        // OSRM devuelve coordenadas en formato [lon, lat] — hay que invertirlas para Leaflet [lat, lon]
                        var coords = data.routes[0].geometry.coordinates.map(function(c) {
                            return [c[1], c[0]];
                        });
                        callback(coords);
                    } else {
                        // Fallback: línea recta si OSRM no encuentra ruta
                        callback([desde, hasta]);
                    }
                })
                .catch(function() {
                    // Fallback: línea recta si hay error de red
                    callback([desde, hasta]);
                });
        }

        // Actualiza el mapa con la nueva coordenada usando routing OSRM
        function actualizarMapa(lat, lon) {
            var nuevoPunto = [parseFloat(lat), parseFloat(lon)];

            // Mover o crear el marcador
            if (!marcador) {
                marcador = L.marker(nuevoPunto).addTo(mapa);
            } else {
                marcador.setLatLng(nuevoPunto);
            }

            mapa.setView(nuevoPunto, mapa.getZoom());

            // Si hay un punto anterior, pedir la ruta por carretera entre ambos
            if (ultimoPunto) {
                obtenerRutaOSRM(ultimoPunto, nuevoPunto, function(coordsRuta) {
                    // Agregar los puntos de la ruta a la polyline existente
                    var puntosActuales = rutaPolyline.getLatLngs();
                    coordsRuta.forEach(function(p) {
                        puntosActuales.push(p);
                    });
                    rutaPolyline.setLatLngs(puntosActuales);
                });
            }

            ultimoPunto = nuevoPunto;
        }

        var todosLosDatos = [];
        var paqueteNum = 0;

        // Convierte timestamp a hora Colombia (UTC-5)
        function extraerFechaHora(timestamp) {
            if (!timestamp) return { fecha: '-', hora: '-' };
            var d = new Date(timestamp);
            if (isNaN(d.getTime())) {
                var str = String(timestamp);
                var espacio = str.split(' ');
                return { fecha: espacio[0] || '-', hora: espacio[1] || '-' };
            }
            var colombia = new Date(d.getTime() - (5 * 60 * 60 * 1000));
            var fecha = colombia.toISOString().split('T')[0];
            var hora = colombia.toISOString().split('T')[1].substring(0, 8);
            return { fecha: fecha, hora: hora };
        }

        function conectarWS() {
            var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var ws = new WebSocket(protocol + '//' + location.host);

            ws.onopen = function() {
                document.getElementById('status').textContent = 'CONECTADO — Capturando paquetes...';
                document.getElementById('status').className = 'connected';
            };

            ws.onmessage = function(event) {
                var msg = JSON.parse(event.data);
                if (msg.type === 'bienvenida') {
                    cargarHistorial();
                }
                if (msg.type === 'nueva_ubicacion') {
                    paqueteNum++;
                    msg.data.numero = paqueteNum;
                    todosLosDatos.unshift(msg.data);
                    actualizarGPS(msg.data);
                    actualizarMapa(msg.data.latitud, msg.data.longitud);
                    agregarFila(msg.data);
                    document.getElementById('contador').textContent = 'Paquetes capturados: ' + todosLosDatos.length;
                }
            };

            ws.onclose = function() {
                document.getElementById('status').textContent = 'DESCONECTADO — Reconectando en 3s...';
                document.getElementById('status').className = 'disconnected';
                setTimeout(conectarWS, 3000);
            };
        }

        function actualizarGPS(data) {
            var fh = extraerFechaHora(data.timestamp_gps);
            document.getElementById('lat').textContent = data.latitud;
            document.getElementById('lng').textContent = data.longitud;
            document.getElementById('fecha').textContent = fh.fecha;
            document.getElementById('hora').textContent = fh.hora;
        }

        function agregarFila(data) {
            var tbody = document.getElementById('dataBody');
            var row = document.createElement('tr');
            var fh = extraerFechaHora(data.fecha_recepcion || data.timestamp_gps);
            var source = (data.ip_origen || '-') + ':' + (data.puerto_origen || '-');
            var destination = (data.ip_destino || '-') + ':' + (data.puerto_destino || '5005');
            var bytes = data.longitud_bytes || '-';
            var info = source + ' → ' + destination + ' Len=' + bytes;

            row.innerHTML =
                '<td>' + (data.numero || '-') + '</td>' +
                '<td>' + fh.fecha + '</td>' +
                '<td>' + fh.hora + '</td>' +
                '<td>' + source + '</td>' +
                '<td>' + destination + '</td>' +
                '<td>UDP</td>' +
                '<td>' + bytes + '</td>' +
                '<td>' + info + '</td>';

            tbody.insertBefore(row, tbody.firstChild);
            while (tbody.children.length > 200) {
                tbody.removeChild(tbody.lastChild);
            }
        }

        // Carga el historial y reconstruye la ruta por carretera entre los puntos históricos
        function cargarHistorial() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/ubicaciones?limit=50');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    if (Array.isArray(data) && data.length > 0) {
                        todosLosDatos = [];
                        var tbody = document.getElementById('dataBody');
                        tbody.innerHTML = '';
                        paqueteNum = 0;
                        rutaPolyline.setLatLngs([]);

                        // Invertir para procesar del más antiguo al más reciente
                        var ordenado = data.slice().reverse();

                        ordenado.forEach(function(d, i) {
                            paqueteNum++;
                            d.numero = paqueteNum;
                            todosLosDatos.unshift(d);
                            agregarFila(d);
                        });

                        // Reconstruir la ruta histórica por carretera
                        // Se hace de forma secuencial para no saturar OSRM con muchas peticiones simultáneas
                        function construirRutaHistorica(index) {
                            if (index >= ordenado.length) {
                                // Terminó — centrar mapa en el último punto
                                var ultimo = [parseFloat(ordenado[ordenado.length - 1].latitud), parseFloat(ordenado[ordenado.length - 1].longitud)];
                                if (!marcador) {
                                    marcador = L.marker(ultimo).addTo(mapa);
                                } else {
                                    marcador.setLatLng(ultimo);
                                }
                                mapa.setView(ultimo, 15);
                                ultimoPunto = ultimo;
                                actualizarGPS(todosLosDatos[0]);
                                return;
                            }

                            var puntoActual = [parseFloat(ordenado[index].latitud), parseFloat(ordenado[index].longitud)];

                            if (index === 0) {
                                // Primer punto — solo agregar sin routing
                                var pts = rutaPolyline.getLatLngs();
                                pts.push(puntoActual);
                                rutaPolyline.setLatLngs(pts);
                                construirRutaHistorica(index + 1);
                            } else {
                                var puntoAnterior = [parseFloat(ordenado[index - 1].latitud), parseFloat(ordenado[index - 1].longitud)];
                                obtenerRutaOSRM(puntoAnterior, puntoActual, function(coords) {
                                    var pts = rutaPolyline.getLatLngs();
                                    coords.forEach(function(p) { pts.push(p); });
                                    rutaPolyline.setLatLngs(pts);
                                    // Pequeña pausa para no saturar la API de OSRM
                                    setTimeout(function() { construirRutaHistorica(index + 1); }, 200);
                                });
                            }
                        }

                        construirRutaHistorica(0);
                        document.getElementById('contador').textContent = 'Paquetes capturados: ' + todosLosDatos.length;
                    }
                }
            };
            xhr.send();
        }

        conectarWS();
    </script>
</body>
</html>
